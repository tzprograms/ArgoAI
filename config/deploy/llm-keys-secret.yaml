---
# LLM API Keys Secret for ArgoCD Agent
#
# SECURITY NOTES:
# - This secret should be created manually or via a secure secrets management system
# - Do NOT commit this file with actual API keys to Git
# - Consider using External Secrets Operator or Sealed Secrets for production
#
# USAGE:
# 1. Copy this template and add your API keys
# 2. Apply with: kubectl apply -f llm-keys-secret.yaml
# 3. Or use: kubectl create secret generic argocd-agent-llm-keys \
#      --from-literal=gemini-api-key=YOUR_KEY \
#      --from-literal=openai-api-key=YOUR_KEY \
#      -n argocd-agent
#
apiVersion: v1
kind: Secret
metadata:
  name: argocd-agent-llm-keys
  namespace: argocd-agent
  labels:
    app.kubernetes.io/name: argocd-agent
    app.kubernetes.io/component: llm-keys
type: Opaque
stringData:
  # Add your API keys below (only add the ones you want to use)
  # Users can still provide keys in the request body (BYOM mode)
  
  # Google Gemini API Key
  # Get from: https://aistudio.google.com/app/apikey
  gemini-api-key: ""
  
  # OpenAI API Key  
  # Get from: https://platform.openai.com/api-keys
  openai-api-key: ""
  
  # Anthropic API Key
  # Get from: https://console.anthropic.com/settings/keys
  anthropic-api-key: ""
  
  # Groq API Key (optional, for open source models)
  # Get from: https://console.groq.com/keys
  groq-api-key: ""
